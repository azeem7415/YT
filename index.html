<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private YouTube Shorts Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f0f] text-[#f1f1f1] min-h-screen font-sans selection:bg-[#ff0000] selection:text-white">
  <div class="max-w-4xl mx-auto px-4 py-12">
    <!-- Header -->
    <div class="mb-10 text-center">
      <div class="inline-flex items-center justify-center gap-3 mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-[#FF0000]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.667,14.667v-5.333L15,12L9.667,14.667z" />
        </svg>
        <h1 class="text-3xl font-bold tracking-tight">YouTube Downloader</h1>
      </div>
      <p class="text-[#aaaaaa] mt-1 text-sm">Download your Shorts and Videos in full HD</p>
    </div>

    <div id="appBox">
      <!-- Input Card -->
      <div class="bg-[#212121] border border-[#3d3d3d] rounded-2xl p-6 shadow-2xl transition-all duration-300 hover:shadow-[#ff0000]/10 hover:border-[#4d4d4d]">
        <div class="mb-5">
          <h2 class="text-lg font-semibold mb-1">Paste YouTube Link</h2>
        </div>

        <div class="relative">
          <input id="youtubeUrl" type="text" placeholder="https://youtube.com/watch?v=... or /shorts/..."
            class="w-full bg-[#121212] border border-[#3d3d3d] rounded-xl pl-4 pr-32 py-4 outline-none focus:border-[#FF0000] transition-colors text-[#f1f1f1] placeholder-[#717171]" />
          <button onclick="fetchMetadata()"
            class="absolute right-2 top-2 bottom-2 bg-[#f1f1f1] text-[#0f0f0f] hover:bg-white rounded-lg px-6 font-semibold transition-all duration-200 active:scale-95 shadow-sm">
            Fetch
          </button>
        </div>

        <p id="status" class="mt-4 text-[#aaaaaa] text-sm font-medium h-5"></p>
      </div>

      <!-- Result Card -->
      <div id="resultBox" class="hidden mt-6 bg-[#212121] border border-[#3d3d3d] rounded-2xl p-6 shadow-2xl transition-all duration-500 transform translate-y-2 opacity-0">
        <div class="grid md:grid-cols-3 gap-6">
          <div class="md:col-span-1 group relative overflow-hidden rounded-xl border border-[#3d3d3d] bg-[#121212]">
            <img id="thumb" class="w-full h-auto object-contain bg-black transition-transform duration-500 group-hover:scale-105" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <span id="channel" class="font-bold text-white text-sm drop-shadow-md"></span>
            </div>
          </div>

          <div class="md:col-span-2 flex flex-col gap-4">
            <div>
              <div class="flex justify-between items-end mb-2">
                <p class="text-xs font-semibold text-[#aaaaaa] uppercase tracking-wider">Video Title</p>
                <button onclick="copyText('title')" class="text-xs text-[#3ea6ff] hover:text-[#65b8ff] transition-colors flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" /></svg>
                  Copy
                </button>
              </div>
              <textarea id="title" rows="2" class="w-full bg-[#121212] border border-[#3d3d3d] rounded-xl px-4 py-3 outline-none focus:border-[#3ea6ff] transition-colors resize-none text-sm leading-relaxed"></textarea>
            </div>

            <div class="flex-grow">
              <div class="flex justify-between items-end mb-2">
                <p class="text-xs font-semibold text-[#aaaaaa] uppercase tracking-wider">Description</p>
                <button onclick="copyText('description')" class="text-xs text-[#3ea6ff] hover:text-[#65b8ff] transition-colors flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" /></svg>
                  Copy
                </button>
              </div>
              <textarea id="description" rows="6" class="w-full h-full bg-[#121212] border border-[#3d3d3d] rounded-xl px-4 py-3 outline-none focus:border-[#3ea6ff] transition-colors resize-none text-sm leading-relaxed"></textarea>
            </div>

            <div class="mt-2 flex flex-col gap-3">
              <button onclick="downloadVideo()" class="w-full bg-[#FF0000] hover:bg-[#cc0000] text-white rounded-xl py-3.5 font-bold tracking-wide transition-all duration-200 active:scale-[0.98] shadow-lg shadow-[#FF0000]/20 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                Download MP4 (HD)
              </button>

              <div id="downloadBox" class="hidden text-center mt-2">
                <p class="text-sm text-green-400 font-medium mb-2">✅ Download Ready</p>
                <a id="downloadLink" href="#" class="text-xs text-[#3ea6ff] hover:text-[#65b8ff] underline underline-offset-2 transition-colors">
                  Click here if it didn't start automatically
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
function setStatus(text) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.classList.remove("text-[#aaaaaa]", "text-red-400", "text-green-400");
  if (text.toLowerCase().includes("error") || text.toLowerCase().includes("invalid")) {
    el.classList.add("text-red-400");
  } else if (text.toLowerCase().includes("ready") || text.toLowerCase().includes("loaded")) {
    el.classList.add("text-green-400");
  } else {
    el.classList.add("text-[#aaaaaa]");
  }
}

async function fetchMetadata() {
  const url = document.getElementById("youtubeUrl").value;
  if (!url) return setStatus("Please enter a valid link");
  
  setStatus("Fetching metadata...");
  const resBox = document.getElementById("resultBox");
  resBox.classList.remove("translate-y-0", "opacity-100");
  resBox.classList.add("translate-y-2", "opacity-0");

  const res = await fetch("/api/metadata", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  if (!res.ok) {
    setStatus(data.error || "Error");
    return;
  }

  resBox.classList.remove("hidden");
  // trigger reflow
  void resBox.offsetWidth;
  resBox.classList.remove("translate-y-2", "opacity-0");
  resBox.classList.add("translate-y-0", "opacity-100");

  document.getElementById("thumb").src = data.thumbnail;
  document.getElementById("channel").innerText = data.channelTitle;
  document.getElementById("title").value = data.title;
  document.getElementById("description").value = data.description;
  setStatus("Metadata loaded.");
}

async function downloadVideo() {
  const url = document.getElementById("youtubeUrl").value;
  const title = document.getElementById("title").value || "youtube-short";
  setStatus("Downloading HD Video... Please wait.");

  const res = await fetch("/api/download", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url, title })
  });

  const data = await res.json();

  if (!res.ok) {
    setStatus(data.error || "Download error");
    return;
  }

  document.getElementById("downloadBox").classList.remove("hidden");
  document.getElementById("downloadLink").href = data.downloadUrl;
  setStatus("Download ready. Starting automatically...");
  
  window.location.href = data.downloadUrl;
}

async function copyText(id) {
  const el = document.getElementById(id);
  await navigator.clipboard.writeText(el.value);
  
  const originalStatus = document.getElementById("status").innerText;
  setStatus(id.charAt(0).toUpperCase() + id.slice(1) + " copied!");
  setTimeout(() => setStatus(originalStatus), 2000);
}
</script>
</body>
</html>
